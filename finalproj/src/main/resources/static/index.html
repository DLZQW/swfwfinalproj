<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康追蹤遊戲化系統 - 極簡黑夜版</title>
    <style>
        /* ================= 基礎質感設定 ================= */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212; color: #e0e0e0; padding: 20px; margin: 0;
        }
        .container {
            max-width: 500px; margin: 40px auto; background: #1e1e1e; padding: 30px;
            border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 1px solid #333; position: relative;
        }
        h1, h2, h3 { color: #ffffff; letter-spacing: 0.5px; margin-top: 0;}

        /* ================= ⚙️ 設定按鈕與動畫 ================= */
        .settings-btn {
            position: absolute;
            top: 25px;
            right: 25px; /* 👉 若想改到左上角，請把 right 改成 left: 25px; */
            background: transparent; border: none;
            font-size: 24px; cursor: pointer; padding: 0;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        .settings-btn:hover { transform: rotate(90deg) scale(1.1); }

        /* ================= 卡片與表單元件 ================= */
        .card {
            background: #252525; padding: 20px; border-radius: 12px; margin-bottom: 25px;
            border: 1px solid #3a3a3a; box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }

        select, input {
            background: #2a2a2a; color: #ffffff; padding: 12px; border-radius: 8px;
            border: 1px solid #444; width: 100%; margin-top: 5px; box-sizing: border-box; font-size: 15px;
            transition: all 0.3s ease;
        }
        select:focus, input:focus { outline: none; border-color: #3498db; box-shadow: 0 0 5px rgba(52, 152, 219, 0.5); }

        button {
            border: none; padding: 12px 15px; border-radius: 8px; cursor: pointer;
            font-size: 15px; font-weight: 600; transition: all 0.2s ease;
        }
        button.btn-submit { background: #3498db; color: #fff; width: 100%; margin-top: 15px;}
        button.btn-submit:hover { background: #2980b9; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(52, 152, 219, 0.4);}
        button.btn-action { background: #2ecc71; color: #000; white-space: nowrap; }
        button.btn-action:hover { background: #27ae60; transform: translateY(-1px); }
        button.btn-delete { background: transparent; color: #e74c3c; padding: 5px 10px; margin: 0; border: 1px solid #e74c3c;}
        button.btn-delete:hover { background: #e74c3c; color: #fff; }

        .form-group { margin-bottom: 15px; }
        .flex-row { display: flex; gap: 10px; align-items: flex-end; margin-top: 10px; }

        /* ================= 絲滑彈出視窗 (Modal) ================= */
        .modal {
            visibility: hidden; opacity: 0;
            position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .modal.show { visibility: visible; opacity: 1; }

        .modal-content {
            background-color: #1e1e1e; margin: 5% auto; padding: 30px; border: 1px solid #444;
            width: 90%; max-width: 500px; border-radius: 16px; box-shadow: 0 15px 50px rgba(0,0,0,0.9);
            max-height: 80vh; overflow-y: auto; position: relative;
            transform: translateY(-30px) scale(0.9); opacity: 0;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .modal.show .modal-content { transform: translateY(0) scale(1); opacity: 1; }

        .close { color: #888; position: absolute; right: 25px; top: 20px; font-size: 28px; font-weight: bold; cursor: pointer; transition: color 0.2s;}
        .close:hover { color: #fff; }

        /* ================= 管理列表 ================= */
        .manage-list { list-style: none; padding: 0; margin: 15px 0; }
        .manage-list li {
            display: flex; justify-content: space-between; align-items: center;
            background: #252525; padding: 12px 15px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #333;
            transition: transform 0.2s;
        }
        .manage-list li:hover { transform: translateX(3px); border-color: #555;}
    </style>
</head>
<body>

<div class="container">
    <button class="settings-btn" onclick="openModal()" title="系統設定">⚙️</button>

    <h1>🏆 健康積分板</h1>

    <div class="card">
        <h2 id="familyName">載入中...</h2>
        <p style="color: #bbb;">家庭總積分：<strong id="familyPoints" style="font-size: 32px; color: #f1c40f;">0</strong> 點</p>
        <ul id="memberList" style="line-height: 1.8; color: #ccc; padding-left: 20px;"></ul>
    </div>

    <h2 style="margin-top: 30px;">📝 登錄紀錄</h2>
    <div class="form-group">
        <label style="color: #bbb; font-size: 14px;">選擇成員</label>
        <select id="memberSelect"></select>
    </div>

    <div class="form-group">
        <label style="color: #bbb; font-size: 14px;">運動種類</label>
        <select id="typeSelect"></select>
    </div>

    <div class="form-group">
        <label style="color: #bbb; font-size: 14px;">時間 (分鐘)</label>
        <input type="number" id="durationInput" placeholder="例如: 30" min="1">
    </div>

    <button class="btn-submit" onclick="submitExercise()">🚀 送出紀錄</button>
    <div id="statusMessage" style="color: #2ecc71; text-align: center; margin-top: 15px; font-weight: bold; min-height: 20px;"></div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 style="border-bottom: 1px solid #444; padding-bottom: 15px; margin-bottom: 25px;">⚙️ 系統設定</h2>

        <h3 style="color: #1abc9c;">👥 家庭成員管理</h3>
        <ul id="settingsMemberList" class="manage-list"></ul>
        <div class="flex-row">
            <input type="text" id="newMemberName" placeholder="輸入新成員姓名">
            <button class="btn-action" onclick="addMember()">新增</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 30px 0;">

        <h3 style="color: #f39c12;">🏋️ 運動項目管理</h3>
        <ul id="settingsExerciseList" class="manage-list"></ul>
        <div class="flex-row">
            <input type="text" id="newExerciseName" placeholder="運動名稱" style="flex: 2;">
            <input type="number" id="newExerciseWeight" placeholder="權重" min="1" style="flex: 1;">
            <button class="btn-action" onclick="addExerciseType()">新增</button>
        </div>
    </div>
</div>

<script>
    window.onload = function() {
        fetchFamilyInfo();
        fetchExercises();
    };

    // --- 絲滑 Modal 開關邏輯 ---
    function openModal() {
        document.getElementById('settingsModal').classList.add('show');
    }
    function closeModal() {
        document.getElementById('settingsModal').classList.remove('show');
    }
    window.onclick = function(event) {
        if (event.target == document.getElementById('settingsModal')) {
            closeModal();
        }
    }

    // --- 抓取與更新畫面資料 ---
    function fetchFamilyInfo() {
        fetch('http://localhost:8080/api/family/info')
            .then(res => res.json())
            .then(data => {
                document.getElementById('familyName').innerText = data.familyName;
                document.getElementById('familyPoints').innerText = data.totalPoints;

                const memberList = document.getElementById('memberList');
                const memberSelect = document.getElementById('memberSelect');
                const settingsMemberList = document.getElementById('settingsMemberList');

                memberList.innerHTML = ''; memberSelect.innerHTML = ''; settingsMemberList.innerHTML = '';

                data.members.forEach(member => {
                    // 更新主畫面
                    const li = document.createElement('li');
                    li.innerHTML = `${member.name} <span style="color:#777; font-size:14px;">(個人積分: <span style="color:#fff;">${member.personalPoints}</span>)</span>`;
                    memberList.appendChild(li);

                    const option = document.createElement('option');
                    option.value = member.memberId; option.innerText = member.name;
                    memberSelect.appendChild(option);

                    // 更新設定視窗內的管理列表
                    const settingLi = document.createElement('li');
                    settingLi.innerHTML = `
                        <span>${member.name}</span>
                        <button class="btn-delete" onclick="deleteMember('${member.memberId}')">刪除</button>
                    `;
                    settingsMemberList.appendChild(settingLi);
                });
            });
    }

    function fetchExercises() {
        fetch('http://localhost:8080/api/exercises')
            .then(res => res.json())
            .then(data => {
                const typeSelect = document.getElementById('typeSelect');
                const settingsExerciseList = document.getElementById('settingsExerciseList');
                typeSelect.innerHTML = ''; settingsExerciseList.innerHTML = '';

                for (const [name, weight] of Object.entries(data)) {
                    // 更新主畫面下拉
                    const option = document.createElement('option');
                    option.value = name; option.innerText = `${name} (權重 x ${weight})`;
                    typeSelect.appendChild(option);

                    // 更新設定視窗內的管理列表
                    const settingLi = document.createElement('li');
                    settingLi.innerHTML = `
                        <span>${name} <span style="color:#888; font-size:13px;">(權重:${weight})</span></span>
                        <button class="btn-delete" onclick="deleteExerciseType('${name}')">刪除</button>
                    `;
                    settingsExerciseList.appendChild(settingLi);
                }
            });
    }

    // --- 新增邏輯 ---
    function addMember() {
        const name = document.getElementById('newMemberName').value;
        if(!name) return;
        fetch(`http://localhost:8080/api/member?name=${encodeURIComponent(name)}`, { method: 'POST' })
        .then(() => { document.getElementById('newMemberName').value = ''; fetchFamilyInfo(); });
    }

    function addExerciseType() {
        const name = document.getElementById('newExerciseName').value;
        const weight = document.getElementById('newExerciseWeight').value;
        if(!name || !weight) return;
        fetch(`http://localhost:8080/api/exercise-type?name=${encodeURIComponent(name)}&weight=${weight}`, { method: 'POST' })
        .then(() => { document.getElementById('newExerciseName').value = ''; document.getElementById('newExerciseWeight').value = ''; fetchExercises(); });
    }

    // --- 刪除邏輯 ---
    function deleteMember(id) {
        if(!confirm('確定要刪除這位成員嗎？他的紀錄將一併消失。')) return;
        fetch(`http://localhost:8080/api/member/${id}`, { method: 'DELETE' })
        .then(() => fetchFamilyInfo());
    }

    function deleteExerciseType(name) {
        if(!confirm(`確定要刪除 [${name}] 嗎？`)) return;
        fetch(`http://localhost:8080/api/exercise-type/${encodeURIComponent(name)}`, { method: 'DELETE' })
        .then(() => fetchExercises());
    }

    // --- 送出紀錄 ---
    function submitExercise() {
        const memberId = document.getElementById('memberSelect').value;
        const type = document.getElementById('typeSelect').value;
        const duration = document.getElementById('durationInput').value;
        if(!duration) { alert('請輸入運動時間！'); return; }

        fetch(`http://localhost:8080/api/exercise?memberId=${memberId}&exerciseType=${encodeURIComponent(type)}&duration=${duration}`, { method: 'POST' })
        .then(res => res.text())
        .then(message => {
            const msgBox = document.getElementById('statusMessage');
            msgBox.innerText = message;
            msgBox.style.opacity = 0;
            setTimeout(() => { msgBox.style.opacity = 1; msgBox.style.transition = 'opacity 0.3s ease'; }, 10);
            fetchFamilyInfo();
        });
    }
</script>

</body>
</html>
